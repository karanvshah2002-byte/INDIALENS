name: Update market data

on:
  schedule:
    - cron: "45 3 * * 1-5"
    - cron: "15,45 4-9 * * 1-5"
    - cron: "5 10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r pipeline/requirements.txt
      - run: python pipeline/update_data.py
      - name: Commit data.json
        run: |
          git config user.name "marketlens-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data update"
          git push
